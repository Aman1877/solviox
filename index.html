    <!-- ═══ JSON-LD Structured Data (Organization) ═══ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Solviox Energy",
        "url": "https://www.solvioxenergy.com",
        "logo": "https://www.solvioxenergy.com/solviox-favicon.svg",
        "description": "Solviox Energy provides advanced solar energy and lighting solutions for homes and businesses across India.",
        "areaServed": "India",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support"
        }
      }
    </script>

    <!-- Theme initialization script to prevent FOUC -->
    <script>
      (function () {
        // TEMPORARILY FORCED TO DARK MODE - Theme toggle commented out
        function getInitialTheme() {
          // Always return dark theme
          return "dark";

          // Original code commented out:
          // const savedTheme = localStorage.getItem('theme');
          // if (savedTheme && (savedTheme === 'light' || savedTheme === 'dark')) {
          //   return savedTheme;
          // }

          // if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          //   return 'dark';
          // }

          // return 'light';
        }

        function applyTheme() {
          const theme = getInitialTheme();
          // Always apply dark theme
          document.documentElement.classList.add("dark");

          // Original code commented out:
          // if (theme === 'dark') {
          //   document.documentElement.classList.add('dark');
          // } else {
          //   document.documentElement.classList.remove('dark');
          // }
        }

        // Apply theme immediately
        applyTheme();

        // Re-apply theme on page visibility change (for navigation)
        document.addEventListener("visibilitychange", function () {
          if (!document.hidden) {
            applyTheme();
          }
        });

        // Re-apply theme on focus (for navigation)
        window.addEventListener("focus", applyTheme);

        // Re-apply theme on storage change (for cross-tab sync)
        window.addEventListener("storage", function (e) {
          if (e.key === "theme") {
            applyTheme();
          }
        });
      })();
    </script>
    <!-- Vite will handle injecting modules and CSS during development -->
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
